<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Briefing">
  <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Matt's personal daily morning and evening briefing">

  <title>Daily Briefing</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- App Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <!-- Google Fonts: DM Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="app">
    <!-- App renders here via JS -->
    <div class="status-bar-spacer"></div>
    <div style="display:flex;align-items:center;justify-content:center;height:80vh;flex-direction:column;gap:16px;">
      <div class="loading-spinner" style="width:24px;height:24px;border:2px solid #E0DDD8;border-top-color:#111;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:#AAA;letter-spacing:0.5px;">Loading briefing…</div>
    </div>
  </div>

  <!-- App Logic -->
  <script src="app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e47fec0c7d5b4b30851b3e2ea4a35607"}'></script>
  <!-- End Cloudflare Web Analytics -->

</body>
</html>
